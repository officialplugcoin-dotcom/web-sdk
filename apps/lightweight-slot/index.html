<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b1220" />
    <title>Lightweight Slot — Pixi.js Base</title>
    <style>
      /* ------------------------------------------------------------------
         CSS reset — minimal surface area for a full-bleed game canvas
         ------------------------------------------------------------------ */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b1220;
        /* Prevent pull-to-refresh / overscroll on mobile browsers */
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
        font-family: system-ui, sans-serif;
      }

      /* Responsive canvas wrapper — centers the Pixi view without stretching */
      #game-root {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b1220;
      }

      #game-root canvas {
        display: block;
        /* Soft letterbox edges; actual size is set by JS to preserve aspect ratio */
        max-width: 100%;
        max-height: 100%;
        /* Avoid sub-pixel blur on low-end GPUs */
        image-rendering: auto;
      }

      /* Lightweight boot overlay — removed once assets + stage are ready */
      #boot {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        background: #0b1220;
        color: #c8d4e8;
        font-size: 14px;
        letter-spacing: 0.04em;
        pointer-events: none;
        transition: opacity 0.25s ease;
      }

      #boot.is-hidden {
        opacity: 0;
        visibility: hidden;
      }

      #boot .bar {
        width: 160px;
        height: 3px;
        background: rgba(200, 212, 232, 0.15);
        overflow: hidden;
      }

      #boot .bar > span {
        display: block;
        height: 100%;
        width: 0%;
        background: #5b9dff;
        transition: width 0.15s linear;
      }
    </style>
  </head>
  <body>
    <div id="boot" aria-live="polite">
      <span>Loading…</span>
      <div class="bar"><span id="boot-progress"></span></div>
    </div>

    <div id="game-root" role="application" aria-label="Slot game canvas"></div>

    <!--
      Pixi.js v8 via CDN (IIFE build exposes global PIXI).
      Prefer the minified production build for low-end Android.
      Swap to npm (`import … from 'pixi.js'`) when wiring into a bundler.
    -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.6.6/dist/pixi.min.js"></script>

    <!-- ES modules — keep type="module" so imports stay tree-friendly -->
    <script type="module" src="./src/game.js"></script>
  </body>
</html>
