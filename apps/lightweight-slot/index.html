<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#050b14" />
    <meta
      name="description"
      content="Robo 5000 by Limitless Studio — high-volatility 5×5 cyberpunk slot. RTP 96%, Max Win 5000×."
    />
    <title>Robo 5000 — Limitless Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #050b14;
        --cyan: #00d4ff;
        --magenta: #ff3cc8;
        --text: #e8fbff;
        --muted: #7ee8ff;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
        font-family: Orbitron, system-ui, sans-serif;
      }

      #game-root {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(ellipse 70% 55% at 50% 30%, #0c1e32 0%, #050b14 68%),
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 3px,
            rgba(0, 212, 255, 0.028) 3px,
            rgba(0, 212, 255, 0.028) 4px
          );
      }

      #game-root canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        image-rendering: auto;
      }

      /* —— Limitless Studio splash —— */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background:
          radial-gradient(circle at 50% 40%, #0a2034 0%, #050b14 70%);
        color: var(--muted);
        pointer-events: none;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }

      #splash.is-hidden {
        opacity: 0;
        visibility: hidden;
      }

      #splash .mark {
        width: min(280px, 70vw);
        height: auto;
        filter: drop-shadow(0 0 18px rgba(0, 212, 255, 0.35));
        animation: pulseGlow 2.2s ease-in-out infinite;
      }

      #splash .studio {
        font-size: 12px;
        letter-spacing: 0.42em;
        text-transform: uppercase;
        color: var(--cyan);
      }

      #splash .game-title {
        font-size: clamp(28px, 7vw, 44px);
        font-weight: 800;
        letter-spacing: 0.22em;
        color: var(--text);
        text-shadow:
          0 0 22px rgba(0, 212, 255, 0.45),
          0 0 40px rgba(255, 60, 200, 0.2);
      }

      #splash .meta {
        font-size: 11px;
        letter-spacing: 0.16em;
        color: #5aa8c0;
        text-transform: uppercase;
      }

      #splash-status {
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        min-height: 1.2em;
      }

      #splash .bar {
        width: min(240px, 64vw);
        height: 4px;
        background: rgba(126, 232, 255, 0.12);
        overflow: hidden;
        border-radius: 2px;
        box-shadow: 0 0 12px rgba(0, 212, 255, 0.15);
      }

      #splash .bar > span {
        display: block;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--cyan), #7ee8ff, var(--magenta));
        background-size: 200% 100%;
        animation: barShine 1.4s linear infinite;
        transition: width 0.15s linear;
      }

      @keyframes pulseGlow {
        0%,
        100% {
          filter: drop-shadow(0 0 12px rgba(0, 212, 255, 0.3));
          transform: scale(1);
        }
        50% {
          filter: drop-shadow(0 0 24px rgba(255, 60, 200, 0.35));
          transform: scale(1.02);
        }
      }

      @keyframes barShine {
        0% {
          background-position: 0% 50%;
        }
        100% {
          background-position: 200% 50%;
        }
      }
    </style>
  </head>
  <body>
    <div id="splash" aria-live="polite">
      <img
        class="mark"
        src="./assets/brand/limitless-studio.png"
        width="280"
        height="84"
        alt="Limitless Studio"
      />
      <div class="studio">Limitless Studio</div>
      <div class="game-title">ROBO 5000</div>
      <div class="meta">RTP 96% · Max Win 5000× · High Volatility</div>
      <div id="splash-status">Initializing…</div>
      <div class="bar"><span id="splash-progress"></span></div>
    </div>

    <div id="game-root" role="application" aria-label="Robo 5000 slot game"></div>

    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.6.6/dist/pixi.min.js"></script>
    <script type="module" src="./src/game.js"></script>
  </body>
</html>
