<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#050b14" />
    <meta name="description" content="Cyber Reels — lightweight 5×3 robotic slot (96% RTP, 5000× max)" />
    <title>Cyber Reels — Robotic Slot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ------------------------------------------------------------------
         CSS reset — minimal surface area for a full-bleed game canvas
         ------------------------------------------------------------------ */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #050b14;
        /* Prevent pull-to-refresh / overscroll on mobile browsers */
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
        font-family: Orbitron, system-ui, sans-serif;
      }

      /* Responsive canvas wrapper — centers the Pixi view without stretching */
      #game-root {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(ellipse 80% 60% at 50% 35%, #0a1a2e 0%, #050b14 70%),
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 3px,
            rgba(0, 220, 255, 0.03) 3px,
            rgba(0, 220, 255, 0.03) 4px
          );
      }

      #game-root canvas {
        display: block;
        /* Soft letterbox edges; actual size is set by JS to preserve aspect ratio */
        max-width: 100%;
        max-height: 100%;
        /* Avoid sub-pixel blur on low-end GPUs */
        image-rendering: auto;
      }

      /* Lightweight boot overlay — removed once assets + stage are ready */
      #boot {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 14px;
        background: #050b14;
        color: #7ee8ff;
        font-size: 13px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        pointer-events: none;
        transition: opacity 0.25s ease;
      }

      #boot.is-hidden {
        opacity: 0;
        visibility: hidden;
      }

      #boot .brand {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0.28em;
        color: #e8fbff;
        text-shadow: 0 0 18px rgba(0, 220, 255, 0.45);
      }

      #boot .bar {
        width: 180px;
        height: 3px;
        background: rgba(126, 232, 255, 0.12);
        overflow: hidden;
      }

      #boot .bar > span {
        display: block;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #00d4ff, #7ee8ff);
        transition: width 0.15s linear;
      }
    </style>
  </head>
  <body>
    <div id="boot" aria-live="polite">
      <span class="brand">CYBER REELS</span>
      <span id="boot-status">Booting systems…</span>
      <div class="bar"><span id="boot-progress"></span></div>
    </div>

    <div id="game-root" role="application" aria-label="Cyber Reels slot game"></div>

    <!--
      Pixi.js v8 via CDN (IIFE build exposes global PIXI).
      Prefer the minified production build for low-end Android.
      Swap to npm (`import … from 'pixi.js'`) when wiring into a bundler.
    -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.6.6/dist/pixi.min.js"></script>

    <!-- ES modules — keep type="module" so imports stay tree-friendly -->
    <script type="module" src="./src/game.js"></script>
  </body>
</html>
