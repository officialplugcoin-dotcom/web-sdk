<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#050b14" />
    <meta
      name="description"
      content="Robo 5000 by Limitless Studio — high-volatility 5×5 cyberpunk slot. RTP 96%, Max Win 5000×."
    />
    <title>Robo 5000 — Limitless Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #050810;
        --cyan: #00d4ff;
        --magenta: #b44cff;
        --gold: #d4af37;
        --text: #f3e9ff;
        --muted: #d2b4ff;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
        font-family: Orbitron, system-ui, sans-serif;
      }

      #game-root {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(ellipse 70% 55% at 50% 30%, #1a0a2e 0%, #050810 68%),
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 3px,
            rgba(180, 76, 255, 0.03) 3px,
            rgba(180, 76, 255, 0.03) 4px
          );
      }

      #game-root canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        image-rendering: auto;
      }

      /* —— Limitless Studio splash —— */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background:
          radial-gradient(circle at 50% 36%, #2a1050 0%, #0a0614 62%, #050810 100%);
        color: var(--muted);
        pointer-events: none;
        transition: opacity 0.45s ease, visibility 0.45s ease;
      }

      #splash.is-hidden {
        opacity: 0;
        visibility: hidden;
      }

      #splash .mark {
        width: min(340px, 78vw);
        height: auto;
        filter: drop-shadow(0 0 28px rgba(180, 76, 255, 0.55));
        animation: pulseGlow 2.4s ease-in-out infinite;
      }

      #splash .studio {
        display: none; /* brand mark already includes wordmark */
      }

      #splash .game-title {
        margin-top: 8px;
        font-size: clamp(28px, 7vw, 46px);
        font-weight: 800;
        letter-spacing: 0.22em;
        color: var(--text);
        text-shadow:
          0 0 22px rgba(180, 76, 255, 0.55),
          0 0 40px rgba(212, 175, 55, 0.25);
      }

      #splash .meta {
        font-size: 11px;
        letter-spacing: 0.16em;
        color: #c9a227;
        text-transform: uppercase;
      }

      #splash-status {
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        min-height: 1.2em;
      }

      #splash .bar {
        width: min(260px, 68vw);
        height: 4px;
        background: rgba(180, 76, 255, 0.15);
        overflow: hidden;
        border-radius: 2px;
        box-shadow: 0 0 14px rgba(180, 76, 255, 0.2);
      }

      #splash .bar > span {
        display: block;
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #7b2cff, #b44cff, var(--gold));
        background-size: 200% 100%;
        animation: barShine 1.4s linear infinite;
        transition: width 0.15s linear;
      }

      @keyframes pulseGlow {
        0%,
        100% {
          filter: drop-shadow(0 0 16px rgba(180, 76, 255, 0.4));
          transform: scale(1);
        }
        50% {
          filter: drop-shadow(0 0 32px rgba(212, 175, 55, 0.45));
          transform: scale(1.03);
        }
      }

      @keyframes barShine {
        0% {
          background-position: 0% 50%;
        }
        100% {
          background-position: 200% 50%;
        }
      }
    </style>
  </head>
  <body>
    <div id="splash" aria-live="polite">
      <img
        class="mark"
        src="./assets/brand/limitless-studio.png"
        width="340"
        height="191"
        alt="Limitless Studio"
      />
      <div class="studio">Limitless Studio</div>
      <div class="game-title">ROBO 5000</div>
      <div class="meta">RTP 96% · Max Win 5000× · High Volatility</div>
      <div id="splash-status">Initializing…</div>
      <div class="bar"><span id="splash-progress"></span></div>
    </div>

    <div id="game-root" role="application" aria-label="Robo 5000 slot game"></div>

    <script src="https://cdn.jsdelivr.net/npm/pixi.js@8.6.6/dist/pixi.min.js"></script>
    <script type="module" src="./src/game.js"></script>
  </body>
</html>
